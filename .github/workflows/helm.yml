name: helm

on:
  push:
    branches: [main]
    paths:
      - "deploy/helm/**"
      - "deploy/k8s/**"
      - ".github/workflows/helm.yml"
  pull_request:
    paths:
      - "deploy/helm/**"
      - "deploy/k8s/**"

jobs:
  lint:
    name: Lint and Template
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: "v3.16.2"

      - name: Helm lint
        run: helm lint deploy/helm/usps-amie

      - name: Helm template (default values)
        run: helm template amie deploy/helm/usps-amie --output-dir /tmp/rendered-default

      - name: Helm template (ollama enabled)
        run: |
          helm template amie deploy/helm/usps-amie \
            --set llm.provider=ollama \
            --set ollama.enabled=true \
            --output-dir /tmp/rendered-ollama

      - name: Helm template (anthropic)
        run: |
          helm template amie deploy/helm/usps-amie \
            --set llm.provider=anthropic \
            --set llm.anthropicApiKey=sk-test \
            --output-dir /tmp/rendered-anthropic

      - name: Install kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz \
            | tar xz -C /usr/local/bin kubeconform

      - name: Validate rendered manifests
        run: |
          kubeconform -strict -ignore-missing-schemas -summary /tmp/rendered-default
          kubeconform -strict -ignore-missing-schemas -summary /tmp/rendered-ollama
          kubeconform -strict -ignore-missing-schemas -summary /tmp/rendered-anthropic
          kubeconform -strict -ignore-missing-schemas -summary deploy/k8s
