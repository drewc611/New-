{{- if not .Values.llm.existingSecretName }}
{{- if eq .Values.llm.provider "anthropic" }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "amie.fullname" . }}-llm
  labels:
    {{- include "amie.labels" . | nindent 4 }}
type: Opaque
stringData:
  ANTHROPIC_API_KEY: {{ .Values.llm.anthropicApiKey | quote }}
{{- end }}
{{- end }}
---
{{- if not .Values.addressVerifier.uspsApi.existingSecretName }}
{{- if eq .Values.addressVerifier.provider "usps_api" }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "amie.fullname" . }}-usps
  labels:
    {{- include "amie.labels" . | nindent 4 }}
type: Opaque
stringData:
  USPS_API_USER_ID: {{ .Values.addressVerifier.uspsApi.userId | quote }}
  USPS_API_PASSWORD: {{ .Values.addressVerifier.uspsApi.password | quote }}
{{- end }}
{{- end }}
---
{{- if and .Values.redis.enabled (not .Values.redis.existingSecretName) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "amie.fullname" . }}-redis
  labels:
    {{- include "amie.labels" . | nindent 4 }}
type: Opaque
stringData:
  REDIS_PASSWORD: {{ default (randAlphaNum 32) .Values.redis.password | quote }}
{{- end }}
